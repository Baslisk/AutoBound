{% extends "base.html" %}
{% load static %}
{% block title %}Annotate — {{ video.file_name }}{% endblock %}

{% block content %}
<div class="annotate-layout">
  <aside class="sidebar">
    <h3>{{ video.file_name }}</h3>
    <p class="meta">{{ video.width }}×{{ video.height }}</p>

    <div class="tool-group">
      <label class="checkbox-label">
        <input type="checkbox" id="showBboxes" checked>
        <span>Show Bounding Boxes</span>
      </label>
    </div>

    <div class="tool-group">
      <button class="btn btn-green btn-block" id="saveBtn">Save Annotations</button>
      <button class="btn btn-block" id="exportBtn">Export COCO JSON</button>
      <button class="btn btn-red btn-block" id="clearBtn">Clear All</button>
    </div>

    <div class="tool-group">
      <label class="btn btn-block btn-file">
        Import COCO JSON
        <input type="file" id="importInput" accept=".json" hidden>
      </label>
    </div>

    <div id="statusBar" class="status-bar">Ready</div>
    <div id="bboxCount" class="bbox-count">0 annotations</div>
  </aside>

  <div class="canvas-wrapper">
    <div class="canvas-area">
      <canvas id="annotationCanvas"></canvas>
    </div>

    <div class="frame-nav">
      <button class="btn btn-sm" id="prevFrameBtn" title="Previous frame (←)">◀ Prev</button>
      <button class="btn btn-sm btn-accent" id="playPauseBtn" title="Play / Pause (Space)">▶ Play</button>
      <span id="frameIndicator" class="frame-indicator">Frame 0 / 0</span>
      <button class="btn btn-sm" id="nextFrameBtn" title="Next frame (→)">Next ▶</button>
    </div>
    <div class="frame-slider-container">
      <div class="time-display">
        <span id="currentTime">0:00</span>
        <span id="remainingTime">-0:00</span>
      </div>
      <input type="range" id="frameSlider" class="frame-slider" min="0" max="0" value="0" step="1">
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const VIDEO_ID = {{ video.id }};
  const FRAME_URL = "{{ frame_url }}";
  const INITIAL_ANNOTATIONS = {{ annotations_json|safe }};
  const CSRF_TOKEN = "{{ csrf_token }}";
  const IMG_WIDTH = {{ video.width }};
  const IMG_HEIGHT = {{ video.height }};
  const FRAME_COUNT = {{ frame_count }};
  const FPS = {{ fps }};
</script>
<script src="{% static 'js/annotator.js' %}"></script>
{% endblock %}
