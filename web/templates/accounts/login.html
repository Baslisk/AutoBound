{% extends "base.html" %}
{% block title %}Login — AutoBound{% endblock %}

{% block content %}
<div class="auth-card">
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {% if form.errors %}
      <div class="alert alert-error">Invalid username or password.</div>
    {% endif %}
    <div class="form-group">
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" required autofocus>
    </div>
    <div class="form-group">
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" required>
    </div>
    <button type="submit" class="btn btn-accent btn-block">Login</button>
  </form>
  <p class="auth-link">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
